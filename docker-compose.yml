services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: winecellar
      POSTGRES_USER: winecellar
      POSTGRES_PASSWORD: winecellar
    ports:
      - "5432:5432"
    volumes:
      - winecellar-postgres-data:/var/lib/postgresql/data

volumes:
  winecellar-postgres-data:
