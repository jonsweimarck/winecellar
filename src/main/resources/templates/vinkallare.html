<!DOCTYPE html>
<html lang="sv" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Vinkällaren</title>
    <script src="https://unpkg.com/htmx.org@2.0.2"></script>
    <style>
        body { font-family: sans-serif; max-width: 48rem; margin: 3rem auto; }
        label { display: block; margin-top: 0.75rem; }
        input, select { width: 100%; padding: 0.4rem; box-sizing: border-box; }
        button { padding: 0.4rem 0.8rem; }
        form.tillägg button { margin-top: 1rem; padding: 0.6rem 1rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 2rem; }
        th, td { text-align: left; padding: 0.5rem; border-bottom: 1px solid #ddd; }
        .antal-form { display: flex; gap: 0.5rem; align-items: center; }
        .antal-form input { width: 4rem; }

        /* Tabell på desktop, kort på mobil - se WineListResponsiveIT som
           verifierar att bara en av vyerna är synlig åt gången. */
        .vinlista-kort { display: none; }
        @media (max-width: 640px) {
            .vinlista-tabell { display: none; }
            .vinlista-kort { display: block; }
        }
        .vinkort {
            border: 1px solid #ddd;
            border-radius: 0.5rem;
            padding: 1rem;
            margin-top: 1rem;
        }
        .vinkort dl {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 0.25rem 1rem;
            margin: 0.5rem 0;
        }
        .vinkort dt { font-weight: bold; }
        .vinkort dd { margin: 0; }
        .vinkort .vinkort-fot { display: flex; flex-direction: column; gap: 0.5rem; align-items: flex-start; margin-top: 0.75rem; }

        .vinbild-tabell { width: 3rem; height: 4rem; object-fit: cover; border-radius: 0.25rem; display: block; }
        .vinbild-kort { width: 100%; max-height: 12rem; object-fit: cover; border-radius: 0.5rem; display: block; margin-bottom: 0.5rem; }
        .vinbild-saknas { color: #999; font-size: 0.85rem; }
        .bild-form { margin-top: 0.25rem; }
        .bild-form input[type=file] { width: auto; padding: 0; }
    </style>
</head>
<body>
    <h1>Vinkällaren</h1>

    <form class="tillägg" hx-post="/wines" hx-target="#vinlista" hx-swap="outerHTML">
        <label>Namn
            <input type="text" name="name" required>
        </label>
        <label>Typ
            <select name="wineType">
                <option value="RED">Rött</option>
                <option value="WHITE">Vitt</option>
                <option value="ROSE">Rosé</option>
                <option value="SPARKLING">Mousserande</option>
                <option value="FORTIFIED">Starkvin</option>
            </select>
        </label>
        <label>Producent
            <input type="text" name="producer" required>
        </label>
        <label>Land
            <input type="text" name="country" required>
        </label>
        <label>Årgång
            <input type="number" name="vintage" required>
        </label>
        <label>Antal flaskor
            <input type="number" name="quantity" min="0" required>
        </label>
        <label>Plats
            <input type="text" name="location" required>
        </label>
        <button type="submit">Lägg till vin</button>
    </form>

    <div id="vinlista" th:fragment="lista">
        <div id="vinlista-tabell" class="vinlista-tabell">
            <table>
                <thead>
                    <tr>
                        <th>Bild</th>
                        <th>Namn</th>
                        <th>Typ</th>
                        <th>Producent</th>
                        <th>Land</th>
                        <th>Årgång</th>
                        <th>Flaskor</th>
                        <th>Plats</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="vin : ${viner}">
                        <td>
                            <img th:if="${vin.harBild()}" th:src="@{/wines/{id}/bild(id=${vin.id.value})}"
                                 alt="Etikett" class="vinbild-tabell">
                            <span th:unless="${vin.harBild()}" class="vinbild-saknas">Ingen bild</span>
                            <form class="bild-form" hx-encoding="multipart/form-data"
                                  th:attr="hx-post=@{/wines/{id}/bild(id=${vin.id.value})}"
                                  hx-target="#vinlista" hx-swap="outerHTML">
                                <input type="file" name="bild" accept="image/*" required>
                                <button type="submit">Ladda upp</button>
                            </form>
                        </td>
                        <td th:text="${vin.name}"></td>
                        <td th:switch="${vin.wineType.name()}">
                            <span th:case="'RED'">Rött</span>
                            <span th:case="'WHITE'">Vitt</span>
                            <span th:case="'ROSE'">Rosé</span>
                            <span th:case="'SPARKLING'">Mousserande</span>
                            <span th:case="'FORTIFIED'">Starkvin</span>
                        </td>
                        <td th:text="${vin.producer}"></td>
                        <td th:text="${vin.country}"></td>
                        <td th:text="${vin.vintage}"></td>
                        <td>
                            <form class="antal-form"
                                  th:attr="hx-post=@{/wines/{id}/antal(id=${vin.id.value})}"
                                  hx-target="#vinlista" hx-swap="outerHTML">
                                <input type="number" name="quantity" min="0" th:value="${vin.quantity}">
                                <button type="submit">Uppdatera</button>
                            </form>
                        </td>
                        <td th:text="${vin.location}"></td>
                        <td>
                            <a th:href="@{/wines/{id}/redigera(id=${vin.id.value})}">Redigera</a>
                            <button type="button"
                                    th:attr="hx-delete=@{/wines/{id}(id=${vin.id.value})}"
                                    hx-target="#vinlista" hx-swap="outerHTML">
                                Ta bort
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div id="vinlista-kort" class="vinlista-kort">
            <div class="vinkort" th:each="vin : ${viner}">
                <img th:if="${vin.harBild()}" th:src="@{/wines/{id}/bild(id=${vin.id.value})}"
                     alt="Etikett" class="vinbild-kort">
                <strong th:text="${vin.name}"></strong>
                <dl>
                    <dt>Typ</dt>
                    <dd th:switch="${vin.wineType.name()}">
                        <span th:case="'RED'">Rött</span>
                        <span th:case="'WHITE'">Vitt</span>
                        <span th:case="'ROSE'">Rosé</span>
                        <span th:case="'SPARKLING'">Mousserande</span>
                        <span th:case="'FORTIFIED'">Starkvin</span>
                    </dd>
                    <dt>Producent</dt>
                    <dd th:text="${vin.producer}"></dd>
                    <dt>Land</dt>
                    <dd th:text="${vin.country}"></dd>
                    <dt>Årgång</dt>
                    <dd th:text="${vin.vintage}"></dd>
                    <dt>Plats</dt>
                    <dd th:text="${vin.location}"></dd>
                </dl>
                <div class="vinkort-fot">
                    <a th:href="@{/wines/{id}/redigera(id=${vin.id.value})}">Redigera</a>
                    <form class="antal-form"
                          th:attr="hx-post=@{/wines/{id}/antal(id=${vin.id.value})}"
                          hx-target="#vinlista" hx-swap="outerHTML">
                        <input type="number" name="quantity" min="0" th:value="${vin.quantity}">
                        <button type="submit">Uppdatera</button>
                    </form>
                    <button type="button"
                            th:attr="hx-delete=@{/wines/{id}(id=${vin.id.value})}"
                            hx-target="#vinlista" hx-swap="outerHTML">
                        Ta bort
                    </button>
                    <form class="bild-form" hx-encoding="multipart/form-data"
                          th:attr="hx-post=@{/wines/{id}/bild(id=${vin.id.value})}"
                          hx-target="#vinlista" hx-swap="outerHTML">
                        <input type="file" name="bild" accept="image/*" required>
                        <button type="submit">Ladda upp bild</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
