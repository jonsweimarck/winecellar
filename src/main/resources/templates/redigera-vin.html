<!DOCTYPE html>
<html lang="sv" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Redigera vin</title>
    <style>
        body { font-family: sans-serif; max-width: 40rem; margin: 3rem auto; padding: 0 1rem; }
        label { display: block; margin-top: 0.75rem; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 0.4rem; box-sizing: border-box; font: inherit; }
        textarea { min-height: 5rem; resize: vertical; }
        button, .knapp { padding: 0.6rem 1rem; margin-top: 1.5rem; }
        .knapp { display: inline-block; text-decoration: none; color: inherit; border: 1px solid #999; border-radius: 0.25rem; }
        fieldset { margin-top: 1.5rem; border: 1px solid #ddd; border-radius: 0.25rem; }
        legend { font-weight: bold; padding: 0 0.5rem; }
    </style>
</head>
<body>
    <h1>Redigera <span th:text="${vin.name}"></span></h1>

    <form method="post" th:action="@{/wines/{id}/redigera(id=${vin.id.value})}">
        <fieldset>
            <legend>Grunduppgifter</legend>
            <label>Namn
                <input type="text" name="name" th:value="${vin.name}" required>
            </label>
            <label>Typ
                <select name="wineType">
                    <option value="RED" th:selected="${vin.wineType.name() == 'RED'}">Rött</option>
                    <option value="WHITE" th:selected="${vin.wineType.name() == 'WHITE'}">Vitt</option>
                    <option value="ROSE" th:selected="${vin.wineType.name() == 'ROSE'}">Rosé</option>
                    <option value="SPARKLING" th:selected="${vin.wineType.name() == 'SPARKLING'}">Mousserande</option>
                    <option value="FORTIFIED" th:selected="${vin.wineType.name() == 'FORTIFIED'}">Starkvin</option>
                </select>
            </label>
            <label>Producent
                <input type="text" name="producer" th:value="${vin.producer}" required>
            </label>
            <label>Land
                <input type="text" name="country" th:value="${vin.country}" required>
            </label>
            <label>Region
                <input type="text" name="region" th:value="${vin.region}">
            </label>
            <label>Underregion
                <input type="text" name="subregion" th:value="${vin.subregion}">
            </label>
            <label>Druvor
                <input type="text" name="grapes" th:value="${vin.grapes}">
            </label>
            <label>Årgång
                <input type="number" name="vintage" th:value="${vin.vintage}" required>
            </label>
            <label>Plats
                <input type="text" name="location" th:value="${vin.location}" required>
            </label>
            <label>Antal flaskor
                <input type="number" name="quantity" min="0" th:value="${vin.quantity}" required>
            </label>
        </fieldset>

        <fieldset>
            <legend>Inköp</legend>
            <label>Inköpsdatum
                <input type="date" name="purchaseDate" th:value="${vin.purchaseDate}">
            </label>
            <label>Pris
                <input type="number" step="0.01" min="0" name="price" th:value="${vin.price}">
            </label>
            <label>Varför köpt
                <textarea name="purchaseReason" th:text="${vin.purchaseReason}"></textarea>
            </label>
        </fieldset>

        <fieldset>
            <legend>Eget intryck</legend>
            <label>Tasting notes
                <textarea name="tastingNotes" th:text="${vin.tastingNotes}"></textarea>
            </label>
            <label>Eget betyg
                <select name="ownRating">
                    <option value="">Inget betyg</option>
                    <option th:each="r : ${betyg}" th:value="${r.name()}" th:text="${r.label()}"
                            th:selected="${vin.ownRating == r}"></option>
                </select>
            </label>
        </fieldset>

        <fieldset>
            <legend>Externa källor</legend>
            <label>Systembolagets produktnummer
                <input type="text" name="systembolagetProductNumber" th:value="${vin.systembolagetProductNumber}">
            </label>
            <label>Systembolagets beskrivning
                <textarea name="systembolagetDescription" th:text="${vin.systembolagetDescription}"></textarea>
            </label>
            <label>Munskänkarnas bedömning
                <textarea name="munskankarnaReview" th:text="${vin.munskankarnaReview}"></textarea>
            </label>
            <label>Munskänkarnas betyg
                <select name="munskankarnaRating">
                    <option value="">Inget betyg</option>
                    <option th:each="r : ${betyg}" th:value="${r.name()}" th:text="${r.label()}"
                            th:selected="${vin.munskankarnaRating == r}"></option>
                </select>
            </label>
            <label>Vivino-betyg
                <input type="number" step="0.1" min="0" max="5" name="vivinoRating" th:value="${vin.vivinoRating}">
            </label>
            <label>Annan referens
                <textarea name="otherReference" th:text="${vin.otherReference}"></textarea>
            </label>
        </fieldset>

        <button type="submit">Spara</button>
        <a class="knapp" href="/">Avbryt</a>
    </form>
</body>
</html>
