spring:
  application:
    name: winecellar
  thymeleaf:
    cache: false
  datasource:
    # POSTGRESQL_ADDON_* sätts automatiskt av Clever Cloud när Postgres-tillägget
    # länkas till appen. Utan dem (lokalt, docker-compose) gäller samma värden
    # som docker-compose.yml.
    url: jdbc:postgresql://${POSTGRESQL_ADDON_HOST:localhost}:${POSTGRESQL_ADDON_PORT:5432}/${POSTGRESQL_ADDON_DB:winecellar}
    username: ${POSTGRESQL_ADDON_USER:winecellar}
    password: ${POSTGRESQL_ADDON_PASSWORD:winecellar}
    hikari:
      # Clever Clouds DEV-nivå av Postgres har ett lågt anslutningstak, se
      # CLAUDE.md - samma fälla som roombooking redan stötte på.
      maximum-pool-size: 3
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    # Låter schema.sql köras EFTER att Hibernate skapat/uppdaterat tabellerna,
    # inte innan - annars kraschar schema.sql:s ALTER TABLE mot en wines-tabell
    # som ännu inte finns (t.ex. mot en helt ny, tom databas).
    defer-datasource-initialization: true
  sql:
    init:
      # Standard är "embedded" (körs bara mot in-memory-databaser som H2) -
      # måste sättas explicit till "always" för att köras mot vår riktiga
      # Postgres också. Se schema.sql för vad som faktiskt körs.
      mode: always
  servlet:
    multipart:
      # Vinetiketter, inte godtyckliga filer - 5 MB är gott och väl för ett foto.
      max-file-size: 5MB
      max-request-size: 5MB

server:
  port: 8080

winecellar:
  admin:
    # Byt ut i produktion via miljövariabeln - "admin" är bara en bekväm
    # standard för lokal utveckling.
    password: ${WINECELLAR_ADMIN_PASSWORD:admin}
